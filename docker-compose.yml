# =============================================================================
#  CyberDyne — Docker Compose
#
#  Uso:
#    # Scan leve (sem Playwright)
#    docker compose run cyberdyne --url https://alvo.com --all --go -o outputs/scan01
#
#    # Scan completo com Playwright + Go
#    docker compose run cyberdyne-full --url https://alvo.com --all --go --browser-mimic-ns -o outputs/scan01
#
#    # Com dashboard --live
#    docker compose run -p 5000:5000 cyberdyne --url https://alvo.com --all --live -o outputs/scan01
#
#    # Retomar de checkpoint
#    docker compose run cyberdyne --resume outputs/scan01/.checkpoint.cyb
# =============================================================================

services:
  # ── Versao leve: Python + Go (sem Playwright, ~300MB) ──────────────────────
  cyberdyne:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./outputs:/cyberdyne/outputs        # resultados saem para o host
      - ./.env:/cyberdyne/.env:ro            # API keys (read-only)
    ports:
      - "5000:5000"                          # --live dashboard
    stdin_open: true
    tty: true

  # ── Versao completa: Python + Go + Playwright (~1.6GB) ─────────────────────
  cyberdyne-full:
    build:
      context: .
      dockerfile: Dockerfile.full
    volumes:
      - ./outputs:/cyberdyne/outputs
      - ./.env:/cyberdyne/.env:ro
    ports:
      - "5000:5000"
    stdin_open: true
    tty: true
